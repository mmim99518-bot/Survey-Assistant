<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>YouTube Mobile App</title>\n    <style>\n        body {\n            margin: 0;\n            font-family: Arial, sans-serif;\n            background-color: #121212;\n            color: #ffffff;\n        }\n        header {\n            padding: 10px;\n            text-align: center;\n            background-color: #1c1c1c;\n        }\n        #videoPlayer {\n            width: 100%;\n            height: 250px;\n            background-color: black;\n        }\n        .video-feed {\n            padding: 10px;\n        }\n        .video {\n            margin-bottom: 10px;\n            cursor: pointer;\n        }\n        input[type='text'] {\n            width: 80%;\n            padding: 10px;\n            margin: 10px;\n            border: none;\n            border-radius: 5px;\n            background-color: #333;\n            color: #fff;\n        }\n    </style>\n</head>\n<body>\n    <header>\n        <h1>YouTube Mobile App</h1>\n        <input type='text' id='search' placeholder='Search...'>\n    </header>\n    <div id='videoPlayer'></div>\n    <div class='video-feed'>\n        <div class='video' data-video-id='video1'>Video 1</div>\n        <div class='video' data-video-id='video2'>Video 2</div>\n        <div class='video' data-video-id='video3'>Video 3</div>\n    </div>\n    <script>\n        const videoFeed = document.querySelectorAll('.video');\n        const videoPlayer = document.getElementById('videoPlayer');\n        videoFeed.forEach(video => {\n            video.addEventListener('click', () => {\n                const videoId = video.getAttribute('data-video-id');\n                videoPlayer.innerHTML = `<iframe width='100%' height='100%' src='https://www.youtube.com/embed/${videoId}' frameborder='0' allowfullscreen></iframe>`;\n            });\n        });\n        document.getElementById('search').addEventListener('input', function() {\n            const searchTerm = this.value.toLowerCase();\n            videoFeed.forEach(video => {\n                video.style.display = video.textContent.toLowerCase().includes(searchTerm) ? '' : 'none';\n            });\n        });\n    <\/script>\n</body>\n</html>
